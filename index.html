<!DOCTYPE html><html lang="ja"><head>
<meta charset="UTF-8">
<title>STG TapShot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#000;color:#fff;overflow:hidden;}
canvas{background:#111;display:block;margin:0 auto;touch-action:none;}
</style>
</head><body>
<canvas id="game"></canvas>

<script>
const cv=document.getElementById("game"),ctx=cv.getContext("2d");
function resize(){cv.width=innerWidth;cv.height=innerHeight;}resize();onresize=resize;

const W=400,H=600;
let touches=[],shooting=false;
let shotCooldown=0;  // ★ ショット間隔

cv.addEventListener("touchstart",e=>{touches=e.touches;});
cv.addEventListener("touchmove",e=>{touches=e.touches;});
cv.addEventListener("touchend",e=>{touches=e.touches;});

let score=0,gameOver=false,gameClear=false,gameComplete=false;
let clearFlash=0,clearTextAlpha=0,clearWait=0,bgY=0;

const player={x:200,y:520,speed:5};
const options=[],bullets=[],bells=[],enemies=[];
let boss=null,bossBullets=[],bossFlash=0;

let left=false,right=false,space=false,threeWay=false;

document.onkeydown=e=>{
  if(e.key==="ArrowLeft")left=true;
  if(e.key==="ArrowRight")right=true;
  if(e.code==="Space")space=true;
};
document.onkeyup=e=>{
  if(e.key==="ArrowLeft")left=false;
  if(e.key==="ArrowRight")right=false;
  if(e.code==="Space")space=false;
};

function shoot(){
  const add=(x,y,vx,vy)=>bullets.push({x,y,vx,vy});
  add(player.x,player.y-10,0,-8);
  if(threeWay){add(player.x,player.y-10,-2,-8);add(player.x,player.y-10,2,-8);}
  options.forEach(op=>{
    add(op.x,op.y-10,0,-8);
    if(threeWay){add(op.x,op.y-10,-2,-8);add(op.x,op.y-10,2,-8);}
  });
}

let bellTimer=0;
function spawnBell(){bells.push({x:Math.random()*360+20,y:-20,r:12,vy:1.5,color:0});}

let enemyTimer=0;
function spawnEnemy(){enemies.push({x:Math.random()*360+20,y:-20,hp:1,speed:2});}

function spawnBoss(){boss={x:200,y:100,r:50,hp:100,dir:1,phase:1,shootTimer:0,shootInterval:40,bulletSpeed:3};}

function completeGame(){gameComplete=true;gameClear=false;}

function update(){

  // ★ 1本指：直接追従
  if(touches.length>=1){
    const t=touches[0];
    const scale=Math.min(cv.width/W,cv.height/H);
    const offX=(cv.width-W*scale)/2;
    const offY=(cv.height-H*scale)/2;
    player.x=(t.clientX-offX)/scale;
    player.y=(t.clientY-offY)/scale;
  }

  // ★ 2本指：ショットON
  shooting = (touches.length>=2 || space);

  // ★ ショット間隔処理
  if(shotCooldown>0) shotCooldown--;

  // PC操作
  if(left)player.x-=player.speed;
  if(right)player.x+=player.speed;

  player.x=Math.max(20,Math.min(380,player.x));
  player.y=Math.max(40,Math.min(580,player.y));

  if(gameClear){
    if(clearFlash<30)clearFlash++;
    else if(clearTextAlpha<1)clearTextAlpha+=0.02;
    else{
      if(clearWait===0)clearWait=120;
      clearWait--;
      if(clearWait<=0)completeGame();
    }
    player.y-=2;return;
  }

  if(gameOver||gameComplete)return;

  bgY+=2;if(bgY>H)bgY=0;

  options.forEach(op=>{
    op.x+=(player.x+op.offset-op.x)*0.2;
    op.y+=(player.y-20-op.y)*0.2;
  });

  // ★ ショット間隔 15
  if(shooting && shotCooldown===0){
    shoot();
    shotCooldown=15;
  }

  for(let i=bullets.length-1;i>=0;i--){
    bullets[i].x+=bullets[i].vx;
    bullets[i].y+=bullets[i].vy;
    if(bullets[i].y<-10)bullets.splice(i,1);
  }

  bellTimer++;if(bellTimer>240){spawnBell();bellTimer=0;}

  for(let i=bells.length-1;i>=0;i--){
    const b=bells[i];b.y+=b.vy;

    for(let j=bullets.length-1;j>=0;j--){
      const dx=b.x-bullets[j].x,dy=b.y-bullets[j].y;
      if(dx*dx+dy*dy<b.r*b.r){
        b.color=(b.color+1)%3;
        bullets.splice(j,1);
      }
    }

    const dx=b.x-player.x,dy=b.y-player.y;
    if(dx*dx+dy*dy<(b.r+10)*(b.r+10)){
      if(b.color===0)score+=100;
      else if(b.color===1){
        if(options.length<2)
          options.push({x:player.x,y:player.y-20,offset:options.length===0?-40:40});
      }else threeWay=true;
      bells.splice(i,1);
      continue;
    }

    if(b.y>620)bells.splice(i,1);
  }

  if(!boss){
    enemyTimer++;
    if(enemyTimer>50){spawnEnemy();enemyTimer=0;}
  }

  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];e.y+=e.speed;
    const dx=e.x-player.x,dy=e.y-player.y;
    if(dx*dx+dy*dy<400)gameOver=true;

    for(let j=bullets.length-1;j>=0;j--){
      const dx2=e.x-bullets[j].x,dy2=e.y-bullets[j].y;
      if(dx2*dx2+dy2*dy2<400){
        e.hp--;bullets.splice(j,1);
        if(e.hp<=0){enemies.splice(i,1);score+=50;}
      }
    }

    if(e.y>630)enemies.splice(i,1);
  }

  if(!boss&&score>=1500){
    enemies.length=0;
    spawnBoss();
  }

  if(boss){

    if(boss.hp<=50&&boss.phase===1){
      boss.phase=2;
      boss.shootInterval=20;
      boss.bulletSpeed=5;
      bossFlash=60;
    }

    boss.x+=boss.dir*(boss.phase===1?2:4);
    if(boss.x<60||boss.x>340)boss.dir*=-1;

    boss.shootTimer++;
    if(boss.shootTimer>boss.shootInterval){
      bossBullets.push({x:boss.x,y:boss.y+20,vx:0,vy:boss.bulletSpeed});
      bossBullets.push({x:boss.x,y:boss.y+20,vx:-2,vy:boss.bulletSpeed});
      bossBullets.push({x:boss.x,y:boss.y+20,vx:2,vy:boss.bulletSpeed});
      boss.shootTimer=0;
    }

    for(let i=bossBullets.length-1;i>=0;i--){
      const bl=bossBullets[i];
      bl.x+=bl.vx;bl.y+=bl.vy;
      const dx=bl.x-player.x,dy=bl.y-player.y;
      if(dx*dx+dy*dy<300)gameOver=true;
      if(bl.y>620)bossBullets.splice(i,1);
    }

    for(let i=bullets.length-1;i>=0;i--){
      const b=bullets[i],dx=boss.x-b.x,dy=boss.y-b.y;
      if(dx*dx+dy*dy<(boss.r+40)*(boss.r+40)){
        boss.hp--;bullets.splice(i,1);
        if(boss.hp<=0){
          boss=null;bossBullets.length=0;gameClear=true;
          break;
        }
      }
    }
  }
}

function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);

  const scale=Math.min(cv.width/W,cv.height/H);
  const offX=(cv.width-W*scale)/2;
  const offY=(cv.height-H*scale)/2;
  ctx.save();
  ctx.translate(offX,offY);
  ctx.scale(scale,scale);

  ctx.fillStyle="#222";
  ctx.fillRect(0,bgY,W,H);
  ctx.fillRect(0,bgY-H,W,H);

  ctx.font="16px 'Press Start 2P'";
  ctx.fillStyle="#fff";
  ctx.fillText("STAGE 1",260,20);

  ctx.font="14px 'Press Start 2P'";
  ctx.fillText("SCORE:"+score,10,20);

  ctx.fillStyle="#0ff";
  ctx.beginPath();
  ctx.arc(player.x,player.y,12,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#0af";
  options.forEach(op=>{
    ctx.beginPath();
    ctx.arc(op.x,op.y,8,0,Math.PI*2);
    ctx.fill();
  });

  ctx.fillStyle="#ff0";
  bullets.forEach(b=>{
    ctx.beginPath();
    ctx.arc(b.x,b.y,3,0,Math.PI*2);
    ctx.fill();
  });

  bells.forEach(b=>{
    ctx.fillStyle=["#ff0","#0af","#f33"][b.color];
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fill();
  });

  enemies.forEach(e=>{
    ctx.fillStyle="#f33";
    ctx.fillRect(e.x-10,e.y-10,20,20);
  });

  if(boss){
    ctx.fillStyle=boss.phase===1?"#f0f":"#f33";
    ctx.beginPath();
    ctx.arc(boss.x,boss.y,boss.r,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="#fff";
    ctx.fillRect(50,20,300,10);
    ctx.fillStyle=boss.phase===1?"#f0f":"#f33";
    ctx.fillRect(50,20,(boss.hp/100)*300,10);

    ctx.fillStyle="#f88";
    bossBullets.forEach(bl=>{
      ctx.beginPath();
      ctx.arc(bl.x,bl.y,6,0,Math.PI*2);
      ctx.fill();
    });

    if(bossFlash>0){
      bossFlash--;
      const alpha=(bossFlash%20)/20,flash=Math.abs(alpha-0.5)*2;
      const shake=Math.sin(bossFlash*0.5)*10;
      ctx.save();ctx.translate(shake,0);
      ctx.font="32px 'Press Start 2P'";
      ctx.fillStyle=`rgba(255,0,0,${flash})`;
      ctx.fillText("WARNING!!",40,150);
      ctx.restore();
    }
  }

  if(gameOver){
    ctx.fillStyle="rgba(0,0,0,0.6)";
    ctx.fillRect(0,0,W,H);
    ctx.font="32px 'Press Start 2P'";
    ctx.fillStyle="#fff";
    ctx.fillText("GAME OVER",40,300);
  }

  if(gameClear){
    if(clearFlash<30){
      ctx.fillStyle=`rgba(255,255,255,${1-clearFlash/30})`;
      ctx.fillRect(0,0,W,H);
    }
    ctx.font="28px 'Press Start 2P'";
    ctx.fillStyle=`rgba(255,255,255,${clearTextAlpha})`;
    ctx.fillText("STAGE CLEAR!",40,300);
  }

  if(gameComplete){
    ctx.fillStyle="rgba(0,0,0,0.7)";
    ctx.fillRect(0,0,W,H);
    ctx.font="28px 'Press Start 2P'";
    ctx.fillStyle="#fff";
    ctx.fillText("GAME COMPLETE!",10,280);
  }

  ctx.restore();
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body></html>
